x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── PostgreSQL con pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_INITDB_ARGS: --data-checksums
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/BD:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - chat-net

  # ── Backend (NestJS) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-backend
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-https://innoovacloud.com}
      APP_URL: ${APP_URL:-https://innoovacloud.com}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - chat-net

  # ── Frontend (Angular + Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BASE_HREF: /agora/
    container_name: chat-frontend
    restart: unless-stopped
    environment:
      API_URL: /agora
      WS_URL: ""
      API_KEY: ${API_KEY:-token2025}
    ports:
      - "${FRONTEND_PORT:-8095}:80"
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  uploads_data:
    driver: local
