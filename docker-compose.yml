x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── PostgreSQL con pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_INITDB_ARGS: --data-checksums
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - chat-net

  # ── Backend (NestJS) ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chat-backend
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      TZ: America/Bogota
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-https://innoovacloud.com}
      APP_URL: ${APP_URL:-https://innoovacloud.com}
      WHATSAPP_PROXY_URL: socks5://127.0.0.1:40000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - chat-net

  # ── Frontend (Angular + Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: chat-frontend
    restart: unless-stopped
    environment:
      API_URL: /agora
      WS_URL: ""
      API_KEY: ${API_KEY:-token2025}
    ports:
      - "${FRONTEND_PORT:-8095}:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging: *default-logging
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pgdata:
    driver: local
  uploads_data:
    driver: local
