# ─── Nginx del HOST — InnoovaCloud Chat ──────────────────────────────
# Instalación: copiar a /etc/nginx/sites-available/chat
#   sudo cp deploy/nginx-host.conf /etc/nginx/sites-available/chat
#   sudo ln -s /etc/nginx/sites-available/chat /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS (solo después de SSL) ───────────────────────────────
server {
    listen 80;
    server_name innoovacloud.com www.innoovacloud.com;

    client_max_body_size 100M;
    server_tokens off;

    # Necesario para que Certbot pueda verificar el dominio
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirigir el resto a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name innoovacloud.com www.innoovacloud.com;

    ssl_certificate     /etc/letsencrypt/live/innoovacloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/innoovacloud.com/privkey.pem;

    client_max_body_size 100M;
    server_tokens off;

    # ── Seguridad ────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Permissions-Policy        "camera=(self), microphone=(self), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Redirigir /agora → /agora/ (evita 404 sin trailing slash) ────
    location = /agora {
        return 301 /agora/;
    }

    # ── Angular App (subpath /agora/) ────────────────────────────────
    location /agora/ {
        proxy_pass http://127.0.0.1:8095/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploaded media (directo a backend, evita doble proxy) ─────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (Socket.IO) ────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:8095/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Catch-all: todo lo no cubierto → 404 (seguridad) ─────────────
    location / {
        return 404;
    }
}
