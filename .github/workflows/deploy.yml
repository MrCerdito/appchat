name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKER_COMPOSE_FILE: docker-compose.yml
  REMOTE_DIR: /opt/chat

jobs:
  ci:
    name: CI — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (smoke test)
        run: docker build -t chat-backend:ci ./backend

      - name: Build frontend image (smoke test)
        run: docker build -t chat-frontend:ci ./frontend
        working-directory: ./frontend

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Run backend lint
        run: pnpm install --frozen-lockfile && pnpm --filter backend lint
        working-directory: .

  deploy:
    name: CD — Deploy to VPS
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    concurrency: production

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Copy project to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'backend/node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'backend/dist' \
            --exclude 'frontend/dist' \
            --exclude '*.log' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.REMOTE_DIR }}/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.REMOTE_DIR }}

            # Si no existe .env, crearlo desde la plantilla
            if [ ! -f backend/.env ]; then
              cp backend/.env.production backend/.env
              echo "⚠️  Creado backend/.env desde plantilla. Configure los secrets manualmente."
            fi

            echo "🔄 Construyendo y levantando servicios..."
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} up -d --build --remove-orphans

            echo "⏳ Esperando healthchecks..."
            sleep 15

            echo "📋 Estado de contenedores:"
            docker compose ps

            echo "✅ Despliegue completado"
