  # ════════════════════════════════════════════════════════════════════════
  # SPA + STATIC — alias strippea /agora/ para resolver archivos
  # ════════════════════════════════════════════════════════════════════════

  location ^~ /agora/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /index.html;
  }

  # ════════════════════════════════════════════════════════════════════════
  # ROOT FALLBACK
  # ════════════════════════════════════════════════════════════════════════

  location = / {
    return 302 /agora/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
