gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # DNS interno de Docker: necesario porque proxy_pass usa una variable
  resolver 127.0.0.11 valid=30s;
  set $backend http://backend:3001;

  client_max_body_size 50M;

  server_tokens off;

  sendfile on;
  tcp_nopush on;

  add_header X-Content-Type-Options    "nosniff" always;
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header Referrer-Policy           "no-referrer" always;
  add_header Permissions-Policy        "camera=(self), microphone=(self), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: data:; connect-src 'self' ws: wss:; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  # ════════════════════════════════════════════════════════════════════════
  # API PROXY — dos conjuntos:
  #   1) /agora/X  → cuando se accede directo (sin proxy externo)
  #   2) /X        → cuando el proxy externo strippea /agora/
  # Los ^~ más específicos ganan por longest prefix match.
  # ════════════════════════════════════════════════════════════════════════

  # ── /agora/health ────────────────────────────────────────────────────────
  location ^~ /agora/health {
    rewrite ^/agora/(.*)$ /$1 break;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── /agora/ai/stream (SSE) ──────────────────────────────────────────────
  location ^~ /agora/ai/stream {
    rewrite ^/agora/(.*)$ /$1 break;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  location ^~ /ai/stream {
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # ── /agora/socket.io (WebSocket) ────────────────────────────────────────
  location ^~ /agora/socket.io {
    rewrite ^/agora/(.*)$ /$1 break;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  location ^~ /socket.io {
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  # ── /agora/uploads ───────────────────────────────────────────────────────
  location ^~ /agora/uploads {
    rewrite ^/agora/(.*)$ /$1 break;
    proxy_pass $backend;
    proxy_http_version 1.1;
