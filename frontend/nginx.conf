upstream backend {
  server backend:3001;
}

gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 50M;

  server_tokens off;

  # ── Seguridad ────────────────────────────────────────────────────────────
  add_header X-Content-Type-Options    "nosniff" always;
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header Referrer-Policy           "no-referrer" always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' ws:; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  # ── Assets con hash (cacheables) ─────────────────────────────────────────
  location ~* \.(?:css|js|mjs|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri /index.html;
  }

  # ── Imágenes y fuentes ───────────────────────────────────────────────────
  location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico)$ {
    expires 1M;
    add_header Cache-Control "public, immutable";
    try_files $uri /index.html;
  }

  # ── Health ───────────────────────────────────────────────────────────────
  location = /health {
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── SSE (streaming AI) — debe ir ANTES que la regex de API ────────────
  location ^~ /ai/stream {
    proxy_pass http://backend;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # ── Socket.IO — debe ir ANTES que la regex de API ─────────────────────
  location ^~ /socket.io/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  # ── API routes ──────────────────────────────────────────────────────────
  location ~ ^/(auth|sessions|advisors|ai|documentos|comunicados|configuracion|widget-config|advisors-whatsapp|track|uploads|faq|tickets)($|/) {
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Runtime config (sin cache) ─────────────────────────────────────────
  location = /env-config.js {
    expires -1;
    add_header Cache-Control "no-store, must-revalidate";
  }

  # ── SPA — todo lo demás va a index.html ────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}