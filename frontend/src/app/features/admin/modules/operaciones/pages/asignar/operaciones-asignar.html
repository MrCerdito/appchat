<div class="opas-page">
  <nav class="opas-nav">
    <button class="opas-back-btn" (click)="volverAlPanel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Volver al panel
    </button>
    <span class="opas-nav-title">Asignar chats</span>
  </nav>

  <div class="opas-filters">
    <div class="opas-search-group">
      <svg class="opas-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="opas-search" type="text" placeholder="Buscar por cliente, teléfono, colegio o asesor" [(ngModel)]="searchQuery" />
    </div>
    <div class="opas-filter-group">
      <label>Estado</label>
      <select [(ngModel)]="filtroEstado">
        <option value="todos">Todos</option>
        <option value="Nuevo">Nuevo</option>
        <option value="Espera">En espera</option>
      </select>
    </div>
    <div class="opas-filter-group">
      <label>Prioridad</label>
      <select [(ngModel)]="filtroPrioridad">
        <option value="todas">Todas</option>
        <option value="critical">Urgente</option>
        <option value="high">Alta</option>
        <option value="normal">Media</option>
        <option value="low">Baja</option>
      </select>
    </div>
  </div>

  <div class="opas-table-wrap">
    <table class="opas-table">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Colegio</th>
          <th>Prioridad</th>
          <th>Último mensaje</th>
          <th>Tiempo espera</th>
          <th>Asignar a</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let chat of chatsFiltrados; trackBy: trackByChatId">
          <td>
            <div class="opas-cliente">
              <div class="opas-avatar" [style.background]="chat.avatar">{{ chat.iniciales }}</div>
              <div>
                <strong>{{ chat.cliente }}</strong>
                <small>{{ chat.telefono }}</small>
              </div>
            </div>
          </td>
          <td><span class="opas-tag">{{ chat.colegio }}</span></td>
          <td><span class="opas-priority" [class]="prioridadClass(chat.prioridad)">{{ chat.prioridad | titlecase }}</span></td>
          <td class="opas-msg-cell">{{ chat.ultimoMensaje }}</td>
          <td>{{ chat.tiempoEspera }}</td>
          <td>
            <select class="opas-select" [ngModel]="selectedAdvisor[chat.id]" (ngModelChange)="selectedAdvisor[chat.id] = $event">
              <option value="">Sin asesor</option>
              <option *ngFor="let a of asesores; trackBy: trackByAdvisorId" [value]="a.id">{{ a.nombre }}</option>
            </select>
          </td>
          <td>
            <button class="opas-assign-btn" [class.loading]="assigning.has(chat.id)" [disabled]="assigning.has(chat.id) || !selectedAdvisor[chat.id] || selectedAdvisor[chat.id] === chat.asesorAsignado" (click)="asignarChat(chat.id, selectedAdvisor[chat.id])">
              {{ assigning.has(chat.id) ? 'Asignando...' : (chat.asesorAsignado && selectedAdvisor[chat.id] !== chat.asesorAsignado ? 'Cambiar' : 'Asignar') }}
            </button>
          </td>
        </tr>
        <tr *ngIf="chatsFiltrados.length === 0">
          <td colspan="7" class="opas-empty">No hay chats pendientes de asignación</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
